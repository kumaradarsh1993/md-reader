name: Build & release installers

# Triggers only on tag push (v*). Hand-trigger via "workflow_dispatch" if you
# need to test the workflow without cutting a real release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build for (used as the release name)"
        required: true
        default: "v0.0.0-test"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Apple Silicon (M1+). Universal binary covers Intel + ARM
          # in one .dmg via Tauri's --target universal-apple-darwin.
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            label: macos
          # Linux — produces .deb + .AppImage by default.
          - platform: ubuntu-22.04
            args: ""
            label: linux
          # Windows — produces .msi + .exe (NSIS).
          - platform: windows-latest
            args: ""
            label: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal Apple binary needs both ARM and x86_64 targets.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS deps
        run: npm ci

      # tauri-action builds the app and, when given a tagName, creates a draft
      # GitHub Release for that tag and uploads the platform artifacts to it.
      # The first job to run creates the draft; subsequent jobs upload into it.
      - name: Build & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name || inputs.tag }}
          releaseName: "md-reader ${{ github.ref_name || inputs.tag }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for full notes.

            **Downloads**
            - Windows: `.msi` (recommended) or `.exe` (NSIS)
            - macOS: `.dmg` (universal — Apple Silicon + Intel)
            - Linux: `.AppImage` (portable) or `.deb` (Debian/Ubuntu)

            Unsigned builds — on first launch Windows SmartScreen / macOS Gatekeeper may warn. Right-click → Open (macOS) or "More info" → "Run anyway" (Windows) the first time.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
